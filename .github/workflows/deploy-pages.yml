# Publie automatiquement le dossier Staging sur GitHub Pages à chaque push sur main.
name: Déploiement GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Configurer Pages
        uses: actions/configure-pages@v5

      - name: Empaqueter le site (dossier Staging)
        uses: actions/upload-pages-artifact@v3
        with:
          path: "2. Development/3. Build : export/1. Staging"

      - name: Déployer
        id: deployment
        uses: actions/deploy-pages@v4
